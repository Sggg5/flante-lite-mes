name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      SECRET_KEY: test-secret-key-with-more-than-thirty-two-characters
      DATABASE_URL: sqlite:///./data/ci.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Run Alembic upgrade
        run: python -m alembic upgrade head

      - name: Run Alembic downgrade
        run: python -m alembic downgrade base

      - name: Run Alembic upgrade again
        run: python -m alembic upgrade head

      - name: Check Alembic model drift
        run: python -m alembic check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      APP_NAME: Flante Lite MES
      APP_VERSION: 0.1.0
      SECRET_KEY: ci-production-secret-key-with-more-than-32-characters
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: AdminTest123!
      POSTGRES_DB: flante_mes_ci
      POSTGRES_USER: flante_mes_ci
      POSTGRES_PASSWORD: ci-postgres-password
      CORS_ORIGINS: http://localhost:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Start Docker services and wait for health checks
        run: docker compose up -d --wait --wait-timeout 240

      - name: Check backend health endpoint
        run: curl --fail --show-error http://localhost:8000/health

      - name: Check frontend homepage
        run: curl --fail --show-error http://localhost:8080/

      - name: Run login smoke test
        run: |
          response="$(curl --fail --show-error \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"AdminTest123!"}' \
            http://localhost:8080/api/v1/auth/login)"
          echo "$response" | jq -e '.access_token and .token_type == "bearer"'

      - name: Run Excel import smoke test
        run: |
          docker compose exec -T backend python - <<'PY'
          import hashlib
          from openpyxl import Workbook
          workbook = Workbook()
          sheet = workbook.active
          sheet.title = "CI虚拟库存"
          sheet.append(["产品编码", "产品名称", "现存数量", "预计入库", "预计出库", "可用数量", "虚拟填充"])
          for index in range(10_000):
              filler = "".join(hashlib.sha256(f"ci-synthetic-{index}-{part}".encode()).hexdigest() for part in range(3))[:152]
              sheet.append([f"CI-SYNTHETIC-{index:05d}", f"CI虚拟产品-{index:05d}", 10, 3, 2, 11, filler])
          sheet.row_dimensions[10_001].hidden = True
          workbook.save("/tmp/ci-import.xlsx")
          PY
          docker compose cp backend:/tmp/ci-import.xlsx ./ci-import.xlsx
          test "$(stat -c%s ci-import.xlsx)" -gt 1048576
          token="$(curl --fail --show-error \
            --connect-timeout 30 --max-time 60 \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"AdminTest123!"}' \
            http://localhost:8080/api/v1/auth/login | jq -r '.access_token')"
          upload="$(curl --fail --show-error \
            --connect-timeout 30 --max-time 600 \
            -H "Authorization: Bearer $token" \
            -F 'import_type=INVENTORY' \
            -F 'source_date=2026-07-18' \
            -F 'file=@ci-import.xlsx;type=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' \
            http://localhost:8080/api/v1/imports/upload)"
          batch_id="$(echo "$upload" | jq -r '.id')"
          curl --fail --show-error \
            -H "Authorization: Bearer $token" -H 'Content-Type: application/json' \
            -d '{"sheet_name":"CI虚拟库存"}' \
            --connect-timeout 30 --max-time 600 \
            "http://localhost:8080/api/v1/imports/$batch_id/analyze" | jq -e '.status == "ANALYZED"'
          premature_status="$(curl --silent --show-error -o /tmp/premature-confirm.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $token" \
            "http://localhost:8080/api/v1/imports/$batch_id/confirm")"
          test "$premature_status" = "409"
          jq -e '.code == "IMPORT_VALIDATION_REQUIRED"' /tmp/premature-confirm.json
          curl --fail --show-error -X POST \
            --connect-timeout 30 --max-time 600 \
            -H "Authorization: Bearer $token" \
            "http://localhost:8080/api/v1/imports/$batch_id/validate" | jq -e '.status == "READY" and .valid_rows == 10000 and .source_date == "2026-07-18" and .hidden_data_rows == 1 and .excluded_hidden_data_rows == 0'
          curl --fail --show-error -X POST \
            --connect-timeout 30 --max-time 600 \
            -H "Authorization: Bearer $token" \
            "http://localhost:8080/api/v1/imports/$batch_id/confirm" | jq -e '.status == "COMPLETED" and .imported_rows == 10000'
          curl --fail --show-error \
            -H "Authorization: Bearer $token" \
            "http://localhost:8080/api/v1/imports/$batch_id" | jq -e '.status == "COMPLETED" and .imported_rows == 10000'

      - name: Show Docker Compose status
        if: always()
        run: docker compose ps

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
